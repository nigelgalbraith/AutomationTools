services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ../scripts/pull_ollama_models.sh:/pull_ollama_models.sh:ro
    entrypoint: ["/bin/bash", "/pull_ollama_models.sh"]
    restart: on-failure

volumes:
  ollama_data: